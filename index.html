<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Chat — AI Client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a35;
    --border-glow: #f7931a33;
    --accent: #f7931a;
    --accent2: #e8610a;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --text-muted: #444455;
    --user-bubble: #1a1a28;
    --ai-bubble: #13131d;
    --success: #4ade80;
    --error: #f87171;
    --radius: 12px;
    --radius-sm: 6px;
    --mono: 'DM Mono', monospace;
    --display: 'Playfair Display', serif;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #000;
    font-family: var(--display);
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .logo-text span {
    color: var(--accent);
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .model-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .model-select:focus { border-color: var(--accent); }
  .model-select option { background: var(--surface2); }

  .icon-btn {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text-dim);
    font-size: 15px;
  }

  .icon-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #f7931a10;
  }

  /* ─── API KEY PANEL ─── */
  .api-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    animation: slideDown 0.3s ease;
  }

  .api-panel.hidden { display: none; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .api-panel label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .api-input-wrap {
    position: relative;
    flex: 1;
  }

  .api-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 36px 8px 12px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }

  .api-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--border-glow);
  }

  .api-toggle {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    padding: 2px;
    transition: color 0.2s;
  }

  .api-toggle:hover { color: var(--accent); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.error { background: var(--error); box-shadow: 0 0 6px var(--error); }

  /* ─── SIDEBAR ─── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.3s, opacity 0.3s;
  }

  .sidebar.collapsed {
    width: 0;
    opacity: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 10px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  .new-chat-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    width: calc(100% - 32px);
    margin: 0 16px 12px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.04em;
  }

  .new-chat-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .new-chat-btn:active { transform: translateY(0); }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }

  .chat-list::-webkit-scrollbar { width: 3px; }
  .chat-list::-webkit-scrollbar-track { background: transparent; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-item {
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: #f7931a15; }
  .chat-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
  }

  .chat-item-icon { font-size: 13px; flex-shrink: 0; }

  .chat-item-text {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .chat-item.active .chat-item-text { color: var(--text); }

  .chat-item-del {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    padding: 0 2px;
    transition: color 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }

  .chat-item:hover .chat-item-del { opacity: 1; }
  .chat-item-del:hover { color: var(--error); }

  /* ─── MAIN CHAT AREA ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── WELCOME SCREEN ─── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 20px;
    text-align: center;
  }

  .welcome-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--display);
    font-size: 32px;
    color: #000;
    font-weight: 600;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 #f7931a40; }
    50% { box-shadow: 0 0 0 12px #f7931a00; }
  }

  .welcome h1 {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 14px;
    max-width: 360px;
    line-height: 1.6;
  }

  .suggestion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-width: 480px;
    width: 100%;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    color: var(--text-dim);
    font-size: 12.5px;
    line-height: 1.4;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
    background: #f7931a08;
    transform: translateY(-1px);
  }

  .suggestion strong {
    display: block;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 3px;
    font-weight: 500;
  }

  /* ─── MESSAGES ─── */
  .message {
    display: flex;
    gap: 12px;
    animation: msgIn 0.25s ease;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    font-family: var(--mono);
    font-size: 11px;
    color: #fff;
    font-weight: 500;
  }

  .message.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: var(--display);
    font-weight: 600;
    font-size: 15px;
  }

  .bubble {
    max-width: calc(100% - 52px);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2a2a45;
    border-bottom-right-radius: 3px;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }

  .bubble code {
    font-family: var(--mono);
    background: #0006;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12.5px;
    color: var(--accent);
  }

  .bubble pre {
    background: #0a0a0f;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    position: relative;
  }

  .bubble pre code {
    background: none;
    padding: 0;
    color: #c9d1d9;
    font-size: 12.5px;
    line-height: 1.6;
  }

  .copy-code-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .copy-code-btn:hover { border-color: var(--accent); color: var(--accent); }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin-bottom: 8px; }
  .bubble li { margin-bottom: 4px; }
  .bubble strong { color: var(--text); font-weight: 500; }
  .bubble h1, .bubble h2, .bubble h3 {
    font-family: var(--display);
    margin-bottom: 8px;
    margin-top: 12px;
    font-weight: 400;
  }
  .bubble h1 { font-size: 18px; }
  .bubble h2 { font-size: 15px; }
  .bubble h3 { font-size: 13.5px; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    padding-left: 2px;
  }

  .msg-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .msg-action {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    padding: 0;
    transition: color 0.2s;
  }

  .msg-action:hover { color: var(--text-dim); }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ─── TOKEN COUNTER ─── */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .stat-value {
    color: var(--text-dim);
    font-weight: 500;
  }

  .stat-sep {
    width: 1px;
    height: 12px;
    background: var(--border);
  }

  /* ─── INPUT AREA ─── */
  .input-area {
    padding: 12px 20px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    max-width: 820px;
    margin: 0 auto;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--border-glow);
  }

  .msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    max-height: 160px;
    min-height: 22px;
    line-height: 1.5;
  }

  .msg-input::placeholder { color: var(--text-muted); }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .temp-slider-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 8px;
  }

  .temp-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .temp-slider {
    width: 70px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .send-btn {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.04); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-icon {
    width: 16px;
    height: 16px;
    fill: #000;
  }

  .hints {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }

  .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9px;
    font-family: var(--mono);
    color: var(--text-dim);
  }

  /* ─── SYSTEM PROMPT PANEL ─── */
  .sys-panel {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: none;
    flex-shrink: 0;
  }

  .sys-panel.open { display: block; }

  .sys-panel textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    outline: none;
    resize: none;
    height: 80px;
    transition: border-color 0.2s;
    max-width: 820px;
    display: block;
    margin: 0 auto;
  }

  .sys-panel textarea:focus { border-color: var(--accent); }

  .sys-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }

  .sys-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    flex: 1;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: var(--radius);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
    z-index: 999;
    max-width: 260px;
    letter-spacing: 0.02em;
  }

  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── MOBILE ─── */
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .suggestion-grid { grid-template-columns: 1fr; }
    .temp-slider-wrap { display: none; }
    header { padding: 10px 14px; }
    .messages { padding: 16px 12px; }
    .input-area { padding: 10px 12px 12px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">L</div>
    <div class="logo-text">Le <span>Chat</span></div>
  </div>
  <div class="header-controls">
    <select class="model-select" id="modelSelect">
      <option value="mistral-large-latest">Mistral Large</option>
      <option value="mistral-small-latest">Mistral Small</option>
      <option value="codestral-latest">Codestral</option>
      <option value="open-mistral-nemo">Mistral Nemo</option>
      <option value="mistral-medium-latest">Mistral Medium</option>
    </select>
    <button class="icon-btn" id="sysBtn" title="System Prompt">⚙</button>
    <button class="icon-btn" id="apiBtn" title="API Key">🔑</button>
    <button class="icon-btn" id="sidebarBtn" title="Toggle Sidebar">☰</button>
  </div>
</header>

<!-- API KEY PANEL -->
<div class="api-panel" id="apiPanel">
  <label>API KEY</label>
  <div class="api-input-wrap">
    <input type="password" class="api-input" id="apiKey" placeholder="Enter your Mistral API key..." autocomplete="off" spellcheck="false">
    <button class="api-toggle" id="apiToggle" title="Show/hide key">👁</button>
  </div>
  <div class="status-dot" id="statusDot" title="Connection status"></div>
</div>

<!-- SYSTEM PROMPT PANEL -->
<div class="sys-panel" id="sysPanel">
  <div class="sys-panel-header">
    <span class="sys-label">System Prompt</span>
    <button class="msg-action" onclick="document.getElementById('sysPanel').classList.remove('open')">✕ Close</button>
  </div>
  <textarea id="sysPrompt" placeholder="You are a helpful assistant..."></textarea>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Conversations</span>
    </div>
    <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome shown here via JS -->
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <span>Msgs</span>
        <span class="stat-value" id="statMsgs">0</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span>Tokens ≈</span>
        <span class="stat-value" id="statTokens">0</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span>Temp</span>
        <span class="stat-value" id="statTemp">0.7</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span>Model</span>
        <span class="stat-value" id="statModel">Mistral Large</span>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="msg-input" id="msgInput" placeholder="Message Le Chat…" rows="1"></textarea>
        <div class="input-actions">
          <div class="temp-slider-wrap" title="Temperature (creativity)">
            <span class="temp-label">Temp</span>
            <input type="range" class="temp-slider" id="tempSlider" min="0" max="1" step="0.1" value="0.7">
            <span class="temp-label" id="tempVal">0.7</span>
          </div>
          <button class="send-btn" id="sendBtn" disabled title="Send (Enter)">
            <svg class="send-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="hints">
        <span class="hint"><kbd>Enter</kbd> Send · <kbd>Shift+Enter</kbd> New line</span>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'lechat_client_v1';

let state = {
  apiKey: '',
  conversations: [],
  activeId: null,
  sidebarOpen: true,
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ─── ELEMENTS ────────────────────────────────────────────────────────────────
const apiKeyEl = document.getElementById('apiKey');
const apiPanelEl = document.getElementById('apiPanel');
const apiToggleEl = document.getElementById('apiToggle');
const statusDot = document.getElementById('statusDot');
const messagesEl = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const chatList = document.getElementById('chatList');
const tempSlider = document.getElementById('tempSlider');
const tempVal = document.getElementById('tempVal');
const modelSelect = document.getElementById('modelSelect');
const statMsgs = document.getElementById('statMsgs');
const statTokens = document.getElementById('statTokens');
const statTemp = document.getElementById('statTemp');
const statModel = document.getElementById('statModel');
const sysPrompt = document.getElementById('sysPrompt');
const sysPanel = document.getElementById('sysPanel');
const sidebar = document.getElementById('sidebar');

// ─── API KEY ─────────────────────────────────────────────────────────────────
function getActiveConv() {
  return state.conversations.find(c => c.id === state.activeId) || null;
}

function setApiKey(key) {
  state.apiKey = key;
  sendBtn.disabled = !key.trim();
  statusDot.className = 'status-dot' + (key.trim() ? ' active' : '');
  saveState();
}

apiKeyEl.addEventListener('input', e => setApiKey(e.target.value));

apiToggleEl.addEventListener('click', () => {
  apiKeyEl.type = apiKeyEl.type === 'password' ? 'text' : 'password';
});

document.getElementById('apiBtn').addEventListener('click', () => {
  apiPanelEl.classList.toggle('hidden');
});

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
document.getElementById('sidebarBtn').addEventListener('click', () => {
  state.sidebarOpen = !state.sidebarOpen;
  sidebar.classList.toggle('collapsed', !state.sidebarOpen);
  saveState();
});

document.getElementById('sysBtn').addEventListener('click', () => {
  sysPanel.classList.toggle('open');
});

// ─── TEMPERATURE ─────────────────────────────────────────────────────────────
tempSlider.addEventListener('input', () => {
  tempVal.textContent = tempSlider.value;
  statTemp.textContent = tempSlider.value;
});

// ─── MODEL ───────────────────────────────────────────────────────────────────
modelSelect.addEventListener('change', () => {
  const names = {
    'mistral-large-latest': 'Mistral Large',
    'mistral-small-latest': 'Mistral Small',
    'codestral-latest': 'Codestral',
    'open-mistral-nemo': 'Mistral Nemo',
    'mistral-medium-latest': 'Mistral Medium',
  };
  statModel.textContent = names[modelSelect.value] || modelSelect.value;
});

// ─── CONVERSATIONS ────────────────────────────────────────────────────────────
function createConversation(firstMsg = '') {
  const id = Date.now().toString();
  const title = firstMsg ? firstMsg.slice(0, 36) + (firstMsg.length > 36 ? '…' : '') : 'New conversation';
  const conv = { id, title, messages: [], tokenCount: 0, createdAt: Date.now() };
  state.conversations.unshift(conv);
  state.activeId = id;
  saveState();
  renderSidebar();
  return conv;
}

function renderSidebar() {
  chatList.innerHTML = '';
  if (state.conversations.length === 0) {
    chatList.innerHTML = `<div style="padding:12px 16px;font-size:11px;color:var(--text-muted);font-family:var(--mono);">No conversations yet</div>`;
    return;
  }
  state.conversations.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (conv.id === state.activeId ? ' active' : '');
    item.innerHTML = `
      <span class="chat-item-icon">💬</span>
      <span class="chat-item-text">${escapeHtml(conv.title)}</span>
      <button class="chat-item-del" data-id="${conv.id}" title="Delete">✕</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('chat-item-del')) return;
      switchConv(conv.id);
    });
    item.querySelector('.chat-item-del').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteConv(conv.id);
    });
    chatList.appendChild(item);
  });
}

function switchConv(id) {
  state.activeId = id;
  saveState();
  renderSidebar();
  renderMessages();
  updateStats();
}

function deleteConv(id) {
  state.conversations = state.conversations.filter(c => c.id !== id);
  if (state.activeId === id) {
    state.activeId = state.conversations[0]?.id || null;
  }
  saveState();
  renderSidebar();
  renderMessages();
}

document.getElementById('newChatBtn').addEventListener('click', () => {
  state.activeId = null;
  renderSidebar();
  renderMessages();
  updateStats();
  msgInput.focus();
});

// ─── RENDER MESSAGES ─────────────────────────────────────────────────────────
function renderMessages() {
  const conv = getActiveConv();
  messagesEl.innerHTML = '';

  if (!conv || conv.messages.length === 0) {
    showWelcome();
    return;
  }

  conv.messages.forEach((msg, i) => {
    const el = buildMessageEl(msg, i);
    messagesEl.appendChild(el);
  });

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showWelcome() {
  const suggestions = [
    { title: 'Explain a concept', body: 'Explain quantum entanglement simply' },
    { title: 'Write code', body: 'Write a Python web scraper for news' },
    { title: 'Brainstorm ideas', body: 'Give me 5 app ideas for teenagers' },
    { title: 'Analyse text', body: 'Summarise the key points in this article' },
  ];
  messagesEl.innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">L</div>
      <h1>Le Chat Client</h1>
      <p>A premium interface for Mistral AI. Add your API key above to get started.</p>
      <div class="suggestion-grid">
        ${suggestions.map(s => `
          <button class="suggestion" onclick="useSuggestion('${escapeHtml(s.body)}')">
            <strong>${s.title}</strong>${s.body}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

window.useSuggestion = (text) => {
  msgInput.value = text;
  autoResize();
  msgInput.focus();
};

function buildMessageEl(msg, index) {
  const wrap = document.createElement('div');
  wrap.className = `message ${msg.role}`;
  const time = new Date(msg.ts || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const avatarContent = msg.role === 'user' ? 'You' : 'L';
  wrap.innerHTML = `
    <div class="avatar">${avatarContent}</div>
    <div style="flex:1;min-width:0;">
      <div class="bubble">${msg.role === 'assistant' ? formatMarkdown(msg.content) : escapeHtml(msg.content).replace(/\n/g,'<br>')}</div>
      <div class="msg-meta">
        <span class="msg-time">${time}</span>
        <button class="msg-action" onclick="copyMsg(${index})" title="Copy">⎘ Copy</button>
        ${msg.role === 'assistant' ? `<button class="msg-action" onclick="regenFrom(${index})" title="Regenerate">↺ Regen</button>` : ''}
      </div>
    </div>
  `;
  // Add copy buttons to code blocks
  wrap.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-code-btn';
    btn.textContent = 'Copy';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText);
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    };
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
  return wrap;
}

window.copyMsg = (i) => {
  const conv = getActiveConv();
  if (!conv) return;
  navigator.clipboard.writeText(conv.messages[i].content);
  showToast('Copied to clipboard');
};

window.regenFrom = async (i) => {
  const conv = getActiveConv();
  if (!conv) return;
  // Remove the AI response and everything after
  conv.messages = conv.messages.slice(0, i);
  saveState();
  renderMessages();
  await sendToApi(conv);
};

// ─── MARKDOWN ─────────────────────────────────────────────────────────────────
function formatMarkdown(text) {
  let t = escapeHtml(text);
  // Code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);
  // Inline code
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headings
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Lists
  t = t.replace(/^\- (.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Paragraphs
  t = t.split('\n\n').map(p => {
    if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<pre')) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return t;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function estimateTokens(text) {
  return Math.ceil(text.split(/\s+/).length * 1.3);
}

function updateStats() {
  const conv = getActiveConv();
  const msgs = conv ? conv.messages.length : 0;
  const tokens = conv ? conv.messages.reduce((a, m) => a + estimateTokens(m.content), 0) : 0;
  statMsgs.textContent = msgs;
  statTokens.textContent = tokens.toLocaleString();
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !state.apiKey.trim()) return;

  let conv = getActiveConv();
  if (!conv) {
    conv = createConversation(text);
  }

  // Add user message
  conv.messages.push({ role: 'user', content: text, ts: Date.now() });
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 36) + (text.length > 36 ? '…' : '');
    renderSidebar();
  }

  saveState();
  renderMessages();
  msgInput.value = '';
  autoResize();
  updateStats();

  await sendToApi(conv);
}

async function sendToApi(conv) {
  sendBtn.disabled = true;
  msgInput.disabled = true;

  // Show typing
  const typingEl = document.createElement('div');
  typingEl.className = 'message ai';
  typingEl.innerHTML = `
    <div class="avatar">L</div>
    <div class="bubble typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  `;
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const systemMsg = sysPrompt.value.trim();
    const apiMessages = conv.messages.map(m => ({ role: m.role, content: m.content }));

    const body = {
      model: modelSelect.value,
      temperature: parseFloat(tempSlider.value),
      messages: apiMessages,
      max_tokens: 2048,
    };

    if (systemMsg) {
      body.system = systemMsg;
    }

    const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.apiKey.trim()}`,
      },
      body: JSON.stringify(body),
    });

    const data = await res.json();

    typingEl.remove();

    if (!res.ok) {
      const errMsg = data.message || data.error || 'API error';
      statusDot.className = 'status-dot error';
      showToast('Error: ' + errMsg);
      return;
    }

    const reply = data.choices?.[0]?.message?.content || '(No response)';
    statusDot.className = 'status-dot active';

    conv.messages.push({ role: 'assistant', content: reply, ts: Date.now() });
    saveState();
    renderMessages();
    updateStats();

  } catch (err) {
    typingEl.remove();
    statusDot.className = 'status-dot error';
    showToast('Network error — check your API key');
  } finally {
    sendBtn.disabled = !state.apiKey.trim();
    msgInput.disabled = false;
    msgInput.focus();
  }
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
function autoResize() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
}

msgInput.addEventListener('input', autoResize);

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
if (state.apiKey) {
  apiKeyEl.value = state.apiKey;
  setApiKey(state.apiKey);
  apiPanelEl.classList.add('hidden');
}
if (!state.sidebarOpen) {
  sidebar.classList.add('collapsed');
}
renderSidebar();
renderMessages();
updateStats();
msgInput.focus();
</script>
</body>
</html>
