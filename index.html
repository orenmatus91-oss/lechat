<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Sora', sans-serif;
  color: #fff2e0;
  background: #0f0700;
}

/* ── BACKGROUND ── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(100px); animation: drift 24s ease-in-out infinite;
}
.orb-a { width:480px;height:480px;background:radial-gradient(circle,#b33500,transparent 70%);top:-180px;left:-160px;opacity:.32; }
.orb-b { width:360px;height:360px;background:radial-gradient(circle,#ff8c00,transparent 70%);bottom:-140px;right:-80px;opacity:.18;animation-delay:-10s;animation-duration:30s; }
@keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-28px)} }

/* ── OVERLAY (dims content when sidebar open on mobile) ── */
#overlay {
  display: none;
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,0.55);
}

/* ── SIDEBAR ── */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 260px;
  z-index: 50;
  display: flex;
  flex-direction: column;
  background: #140900;
  border-right: 1px solid rgba(255,130,0,0.18);
  transform: translateX(0);
  transition: transform 0.28s ease;
  overflow: hidden;
}

#sidebar.hidden {
  transform: translateX(-260px);
}

/* ── MAIN WRAPPER (pushed right when sidebar open on desktop) ── */
#main-wrapper {
  position: fixed;
  inset: 0;
  left: 260px;
  display: flex;
  flex-direction: column;
  transition: left 0.28s ease;
  z-index: 1;
}

#main-wrapper.full {
  left: 0;
}

/* on mobile main-wrapper always fills screen */
@media (max-width: 600px) {
  #main-wrapper { left: 0 !important; }
}

/* ── SIDEBAR CONTENTS ── */
.sb-top {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px 14px;
  border-bottom: 1px solid rgba(255,130,0,0.15);
  flex-shrink: 0;
}

.sb-logo-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, #ff8c00, #c44200);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(255,140,0,0.4);
}
.sb-logo-icon svg { width: 14px; height: 14px; fill: #000; }

.sb-logo-name {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 20px;
  background: linear-gradient(130deg, #ffb347, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sb-new-btn {
  margin: 12px 12px 8px;
  padding: 10px 14px;
  background: linear-gradient(135deg, #ff8c00, #c44200);
  border: none; border-radius: 10px;
  color: #000; font-family: 'Sora', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: opacity 0.18s, transform 0.14s;
  box-shadow: 0 3px 14px rgba(255,140,0,0.3);
  flex-shrink: 0;
  width: calc(100% - 24px);
}
.sb-new-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.sb-section-label {
  padding: 10px 16px 4px;
  font-size: 9.5px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.11em; text-transform: uppercase;
  color: rgba(255,242,224,0.2);
  flex-shrink: 0;
}

.sb-chat-list {
  flex: 1; overflow-y: auto;
  padding: 0 8px 10px;
  display: flex; flex-direction: column; gap: 2px;
}
.sb-chat-list::-webkit-scrollbar { width: 3px; }
.sb-chat-list::-webkit-scrollbar-thumb { background: rgba(255,130,0,0.2); border-radius: 2px; }

.chat-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 10px;
  cursor: pointer; transition: background 0.15s;
}
.chat-row:hover { background: rgba(255,255,255,0.06); }
.chat-row.active {
  background: rgba(255,140,0,0.13);
  border: 1px solid rgba(255,140,0,0.2);
}
.chat-row-icon { font-size: 14px; flex-shrink: 0; }
.chat-row-title {
  flex: 1; font-size: 12.5px; color: rgba(255,242,224,0.6);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-row.active .chat-row-title { color: #fff2e0; }
.chat-row-del {
  display: none; background: none; border: none;
  color: rgba(255,242,224,0.3); cursor: pointer;
  font-size: 13px; padding: 2px 3px; flex-shrink: 0;
  transition: color 0.15s;
}
.chat-row:hover .chat-row-del { display: block; }
.chat-row-del:hover { color: #f87171; }

.sb-bottom {
  flex-shrink: 0;
  border-top: 1px solid rgba(255,130,0,0.14);
  padding: 10px 12px;
}

.key-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 10px;
  cursor: pointer; transition: background 0.15s;
}
.key-row:hover { background: rgba(255,255,255,0.06); }
.key-dots { display: flex; gap: 4px; }
.key-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.14);
  transition: background 0.3s, box-shadow 0.3s;
}
.key-dot.ok   { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
.key-dot.warn { background: #fbbf24; box-shadow: 0 0 5px #fbbf24; }
.key-label { flex: 1; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(255,242,224,0.35); }
.key-active-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #ffb347; }

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; gap: 8px;
  height: 54px; padding: 0 14px;
  background: rgba(10,5,0,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,130,0,0.14);
  flex-shrink: 0;
}

.tb-icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,242,224,0.6);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.tb-icon-btn:hover { background: rgba(255,255,255,0.08); border-color: #ff8c00; color: #ff8c00; }

.model-chip {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px; padding: 5px 12px 5px 8px;
}
.model-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ff8c00; box-shadow: 0 0 6px #ff8c00;
  animation: blink 2.5s ease-in-out infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.model-pick {
  background: none; border: none;
  color: rgba(255,242,224,0.6);
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  cursor: pointer; outline: none;
}
.model-pick option { background: #1e1000; }

.tb-title {
  flex: 1; font-size: 13px; color: rgba(255,242,224,0.5);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}

/* ── KEY DRAWER ── */
#key-drawer {
  flex-shrink: 0;
  background: rgba(8,4,0,0.92);
  border-bottom: 1px solid rgba(255,130,0,0.14);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.28s ease;
}
#key-drawer.open { max-height: 240px; }

.key-drawer-inner {
  padding: 14px 16px 16px;
  max-width: 700px; margin: 0 auto;
}

.drawer-heading {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: #ffb347; margin-bottom: 12px;
}

.key-slot { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.slot-num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: rgba(255,242,224,0.35); width: 40px; text-align: right; flex-shrink: 0;
}
.slot-wrap { flex: 1; position: relative; }
.slot-field {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 7px; color: #fff2e0;
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  padding: 7px 30px 7px 10px;
  outline: none; letter-spacing: 0.03em;
  transition: border-color 0.2s;
}
.slot-field:focus { border-color: rgba(255,140,0,0.5); }
.slot-field::placeholder { color: rgba(255,242,224,0.2); }
.slot-eye {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: rgba(255,242,224,0.3); font-size: 12px; transition: color 0.15s;
}
.slot-eye:hover { color: #ff8c00; }
.slot-status { font-size: 14px; width: 20px; flex-shrink: 0; text-align: center; }

.save-keys-btn {
  margin-top: 4px; padding: 7px 16px;
  background: linear-gradient(135deg, #ff8c00, #c44200);
  border: none; border-radius: 7px;
  color: #000; font-family: 'Sora', sans-serif;
  font-size: 12.5px; font-weight: 600;
  cursor: pointer; transition: opacity 0.18s;
}
.save-keys-btn:hover { opacity: 0.85; }

/* ── MESSAGES ── */
#messages {
  flex: 1; overflow-y: auto;
  padding: 24px 16px;
  display: flex; flex-direction: column; gap: 20px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: rgba(255,130,0,0.2); border-radius: 2px; }

/* Welcome */
.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 18px;
  padding: 28px 20px;
  max-width: 520px; width: 100%; margin: auto;
  animation: fade-up 0.4s ease;
}
@keyframes fade-up {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

.wlc-icon {
  width: 68px; height: 68px; border-radius: 18px;
  background: linear-gradient(135deg, #ff8c00, #c44200);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 36px rgba(255,140,0,0.45), 0 0 70px rgba(196,68,0,0.2);
  animation: icon-pulse 4s ease-in-out infinite;
  flex-shrink: 0;
}
.wlc-icon svg { width: 32px; height: 32px; fill: #000; }
@keyframes icon-pulse {
  0%,100% { box-shadow:0 0 36px rgba(255,140,0,0.45),0 0 70px rgba(196,68,0,0.2); }
  50%      { box-shadow:0 0 54px rgba(255,140,0,0.65),0 0 90px rgba(196,68,0,0.35); }
}

.wlc-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 30px; font-weight: 400;
  background: linear-gradient(135deg, #ffb347, #ff8c00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.wlc-sub { color: rgba(255,242,224,0.6); font-size: 14px; line-height: 1.6; max-width: 340px; }

.sug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
@media(max-width:480px) { .sug-grid { grid-template-columns: 1fr; } }

.sug-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,130,0,0.15);
  border-radius: 12px; padding: 12px 14px;
  cursor: pointer; text-align: left; transition: all 0.2s;
}
.sug-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: #ff8c00;
  transform: translateY(-2px);
}
.sug-card-icon { font-size: 17px; margin-bottom: 5px; display: block; }
.sug-card-title { font-size: 12.5px; font-weight: 500; color: #fff2e0; margin-bottom: 2px; }
.sug-card-sub { font-size: 11.5px; color: rgba(255,242,224,0.4); line-height: 1.4; }

/* Message rows */
.msg-row {
  display: flex; gap: 11px;
  max-width: 700px; width: 100%; margin: 0 auto;
  animation: msg-appear 0.2s ease;
}
@keyframes msg-appear {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-row.user { flex-direction: row-reverse; }

.msg-av {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
}
.msg-row.ai   .msg-av { background:linear-gradient(135deg,#ff8c00,#c44200); color:#000; font-family:'Playfair Display',serif; font-style:italic; font-size:15px; box-shadow:0 0 10px rgba(255,140,0,0.3); }
.msg-row.user .msg-av { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; font-family:'JetBrains Mono',monospace; font-size:11px; }

.msg-body { flex: 1; min-width: 0; }

.bubble {
  padding: 11px 15px; border-radius: 13px;
  font-size: 14px; line-height: 1.7; word-break: break-word;
}
.msg-row.user .bubble { background:rgba(255,140,0,0.09); border:1px solid rgba(255,140,0,0.2); border-bottom-right-radius:4px; }
.msg-row.ai   .bubble { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-bottom-left-radius:4px; }

/* Markdown */
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { padding-left: 18px; margin-bottom: 8px; }
.bubble li { margin-bottom: 3px; }
.bubble strong { color: #ffb347; font-weight: 500; }
.bubble em { color: rgba(255,242,224,0.7); }
.bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 6px; }
.bubble h1 { font-family:'Playfair Display',serif;font-style:italic;font-size:19px;color:#ffb347; }
.bubble h2 { font-size:15px;font-weight:600; }
.bubble h3 { font-size:13.5px;font-weight:500;color:rgba(255,242,224,0.7); }
.bubble blockquote { border-left:3px solid #ff8c00;padding-left:12px;margin:8px 0;color:rgba(255,242,224,0.65);font-style:italic; }
.bubble hr { border:none;border-top:1px solid rgba(255,255,255,0.08);margin:10px 0; }
.bubble code { font-family:'JetBrains Mono',monospace;background:rgba(255,140,0,0.1);color:#ffb347;padding:2px 5px;border-radius:4px;font-size:12.5px;border:1px solid rgba(255,140,0,0.14); }
.bubble pre { background:rgba(4,2,0,0.9);border:1px solid rgba(255,130,0,0.15);border-radius:10px;padding:14px;margin:9px 0;overflow-x:auto;position:relative; }
.bubble pre code { background:none;border:none;padding:0;color:#e8c890;font-size:12.5px;line-height:1.65; }

.copy-code-btn {
  position:absolute;top:8px;right:8px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,242,224,0.5);font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 8px;border-radius:4px;cursor:pointer;transition:all 0.15s;
}
.copy-code-btn:hover { border-color:#ff8c00;color:#ff8c00; }

.key-switch-note {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25);
  border-radius: 999px; padding: 2px 9px; margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fbbf24;
}

.msg-meta {
  display: flex; align-items: center; gap: 7px;
  margin-top: 5px; padding: 0 2px;
}
.msg-row.user .msg-meta { flex-direction: row-reverse; }
.msg-time { font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,242,224,0.18); }
.msg-act-btns { display: flex; gap: 3px; }
.msg-act {
  background: none; border: none; cursor: pointer;
  color: rgba(255,242,224,0.22); font-size: 12px;
  padding: 2px 5px; border-radius: 4px; transition: all 0.15s;
}
.msg-act:hover { background:rgba(255,255,255,0.06);color:rgba(255,242,224,0.65); }

/* Typing indicator */
.typing-row { display:flex;gap:11px;max-width:700px;width:100%;margin:0 auto; }
.typing-bubble {
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:13px;border-bottom-left-radius:4px;
  padding:14px 18px;display:flex;gap:6px;align-items:center;
}
.t-dot { width:8px;height:8px;border-radius:50%;animation:tdot 1.3s ease-in-out infinite; }
.t-dot:nth-child(1){background:#ff8c00;}
.t-dot:nth-child(2){background:#ffb347;animation-delay:0.18s;}
.t-dot:nth-child(3){background:#c44200;animation-delay:0.36s;}
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.45} 30%{transform:translateY(-6px);opacity:1} }

/* ── STATS BAR ── */
#statsbar {
  display: flex; align-items: center; overflow-x: auto;
  background: rgba(8,4,0,0.65);
  border-top: 1px solid rgba(255,130,0,0.1);
  padding: 4px 16px; flex-shrink: 0; gap: 0;
}
#statsbar::-webkit-scrollbar { display: none; }
.stat-item {
  display: flex; align-items: center; gap: 5px;
  padding: 0 12px;
  border-right: 1px solid rgba(255,130,0,0.07);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: rgba(255,242,224,0.32); white-space: nowrap;
}
.stat-item:first-child { padding-left: 0; }
.stat-item:last-child { border-right: none; }
.stat-val { color: rgba(255,242,224,0.6); font-weight: 500; }

/* ── INPUT ── */
#input-area {
  padding: 10px 14px 14px;
  background: rgba(10,5,0,0.75);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,130,0,0.14);
  flex-shrink: 0;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
}

.input-inner { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 7px; }

.input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 13px; padding: 10px 10px 10px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box:focus-within {
  border-color: rgba(255,140,0,0.45);
  box-shadow: 0 0 0 3px rgba(255,140,0,0.08);
}
.msg-field {
  flex: 1; background: none; border: none; outline: none;
  color: #fff2e0; font-family: 'Sora', sans-serif;
  font-size: 14.5px; line-height: 1.55;
  resize: none; min-height: 22px; max-height: 160px;
}
.msg-field::placeholder { color: rgba(255,242,224,0.3); }

.input-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.temp-group {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px; padding: 5px 8px;
}
.temp-lbl { font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,242,224,0.35); }
input[type=range].temp-slider { width:56px;accent-color:#ff8c00;cursor:pointer; }

.send-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, #ff8c00, #c44200);
  border: none; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 14px rgba(255,140,0,0.35);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.send-btn:hover:not(:disabled) { transform:translateY(-1px) scale(1.05); box-shadow:0 5px 18px rgba(255,140,0,0.5); }
.send-btn:active:not(:disabled) { transform:scale(0.97); }
.send-btn:disabled { opacity:0.28; cursor:not-allowed; box-shadow:none; }
.send-btn svg { width:17px;height:17px;fill:#000; }

.input-hints { display:flex;align-items:center;gap:10px;padding:0 2px; }
.hint-txt { font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,242,224,0.18); }
kbd { background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:1px 5px;font-size:9px;font-family:'JetBrains Mono',monospace;color:rgba(255,242,224,0.45); }
.action-btn {
  background:none;border:none;cursor:pointer;
  font-size:11px;color:rgba(255,242,224,0.3);
  padding:2px 7px;border-radius:4px;
  font-family:'JetBrains Mono',monospace;transition:all 0.15s;
}
.action-btn:hover { background:rgba(255,255,255,0.06);color:rgba(255,242,224,0.65); }
.action-btn.danger:hover { color:#f87171; }

/* ── TOAST ── */
#toasts {
  position: fixed; bottom: 80px; right: 16px;
  z-index: 9999; display: flex; flex-direction: column; gap: 6px;
  pointer-events: none;
}
.toast {
  background: rgba(20,10,0,0.97);
  border: 1px solid rgba(255,130,0,0.2);
  border-radius: 10px; padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: #fff2e0; max-width: 260px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.55);
  animation: t-in 0.25s ease, t-out 0.25s 1.9s ease forwards;
}
.toast.ok   { border-color: rgba(74,222,128,0.35); }
.toast.err  { border-color: rgba(248,113,113,0.35); }
.toast.warn { border-color: rgba(251,191,36,0.35); }
@keyframes t-in  { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
@keyframes t-out { to{opacity:0;transform:translateX(10px)} }

</style>
</head>
<body>

<!-- Background -->
<div id="bg">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
</div>

<!-- Overlay (tap to close sidebar on mobile) -->
<div id="overlay"></div>

<!-- Toasts -->
<div id="toasts"></div>

<!-- ══════════ SIDEBAR ══════════ -->
<div id="sidebar">

  <div class="sb-top">
    <div class="sb-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    </div>
    <span class="sb-logo-name">Lumi</span>
  </div>

  <button class="sb-new-btn" id="newChatBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Chat
  </button>

  <div class="sb-section-label">History</div>
  <div class="sb-chat-list" id="chatList"></div>

  <div class="sb-bottom">
    <div class="key-row" id="keyRowBtn">
      <div class="key-dots">
        <div class="key-dot" id="kd0"></div>
        <div class="key-dot" id="kd1"></div>
        <div class="key-dot" id="kd2"></div>
      </div>
      <span class="key-label">API Keys</span>
      <span class="key-active-label" id="keyActiveLabel">None</span>
    </div>
  </div>

</div>

<!-- ══════════ MAIN WRAPPER ══════════ -->
<div id="main-wrapper">

  <!-- Topbar -->
  <div id="topbar">
    <button class="tb-icon-btn" id="sidebarToggleBtn" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="model-chip">
      <div class="model-dot"></div>
      <select class="model-pick" id="modelPick">
        <option value="mistral-large-latest">Mistral Large</option>
        <option value="mistral-small-latest">Mistral Small</option>
        <option value="codestral-latest">Codestral</option>
        <option value="open-mistral-nemo">Mistral Nemo</option>
        <option value="mistral-medium-latest">Mistral Medium</option>
      </select>
    </div>

    <span class="tb-title" id="topbarTitle"></span>

    <button class="tb-icon-btn" id="keyIconBtn" title="API Keys">🔑</button>
  </div>

  <!-- Key Drawer -->
  <div id="key-drawer">
    <div class="key-drawer-inner">
      <div class="drawer-heading">🔑 Mistral API Keys — auto-failover</div>
      <div class="key-slot">
        <span class="slot-num">KEY 1</span>
        <div class="slot-wrap">
          <input type="password" class="slot-field" id="keyField0" placeholder="Primary API key…" autocomplete="off" spellcheck="false">
          <button class="slot-eye" data-i="0">👁</button>
        </div>
        <span class="slot-status" id="kstat0">—</span>
      </div>
      <div class="key-slot">
        <span class="slot-num">KEY 2</span>
        <div class="slot-wrap">
          <input type="password" class="slot-field" id="keyField1" placeholder="Backup key 1…" autocomplete="off" spellcheck="false">
          <button class="slot-eye" data-i="1">👁</button>
        </div>
        <span class="slot-status" id="kstat1">—</span>
      </div>
      <div class="key-slot">
        <span class="slot-num">KEY 3</span>
        <div class="slot-wrap">
          <input type="password" class="slot-field" id="keyField2" placeholder="Backup key 2…" autocomplete="off" spellcheck="false">
          <button class="slot-eye" data-i="2">👁</button>
        </div>
        <span class="slot-status" id="kstat2">—</span>
      </div>
      <button class="save-keys-btn" id="saveKeysBtn">Save Keys</button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Stats bar -->
  <div id="statsbar">
    <div class="stat-item"><span>MSGS</span><span class="stat-val" id="sMsgs">0</span></div>
    <div class="stat-item"><span>TOKENS≈</span><span class="stat-val" id="sTok">0</span></div>
    <div class="stat-item"><span>TEMP</span><span class="stat-val" id="sTemp">0.7</span></div>
    <div class="stat-item"><span>MODEL</span><span class="stat-val" id="sMod">Mistral Large</span></div>
    <div class="stat-item"><span>KEY</span><span class="stat-val" id="sKeyNum">—</span></div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-inner">
      <div class="input-box">
        <textarea class="msg-field" id="msgField" placeholder="Message Lumi…" rows="1"></textarea>
        <div class="input-right">
          <div class="temp-group" title="Temperature">
            <span class="temp-lbl">🌡</span>
            <input type="range" class="temp-slider" id="tempSlider" min="0" max="1" step="0.05" value="0.7">
            <span class="temp-lbl" id="tempDisplay">0.7</span>
          </div>
          <button class="send-btn" id="sendBtn" disabled>
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hints">
        <span class="hint-txt"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline</span>
        <button class="action-btn danger" id="clearChatBtn">✕ Clear</button>
      </div>
    </div>
  </div>

</div><!-- /main-wrapper -->

<script>
// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function G(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function tok(t) { return Math.ceil(t.split(/\s+/).length * 1.35); }
function fmtTime(ts) { return new Date(ts||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

const EMOJIS = ['💬','🌙','⚡','🔮','🌊','🎯','🧠','✨','🔬','🎨','🚀','💡','🌿','🎭','🔥'];
const MODEL_NAMES = {
  'mistral-large-latest':'Mistral Large',
  'mistral-small-latest':'Mistral Small',
  'codestral-latest':'Codestral',
  'open-mistral-nemo':'Nemo',
  'mistral-medium-latest':'Mistral Medium'
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const STORE_KEY = 'lumi_v5';

let state = {
  keys: ['','',''],
  activeKeyIdx: 0,
  convs: [],
  activeId: null,
  sidebarOpen: false,   // starts CLOSED on mobile
  model: 'mistral-large-latest',
};

function loadState() {
  try {
    const d = localStorage.getItem(STORE_KEY);
    if (d) Object.assign(state, JSON.parse(d));
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

function activeConv() {
  return state.convs.find(c => c.id === state.activeId) || null;
}

// ═══════════════════════════════════════════
// SIDEBAR TOGGLE  ← THE KEY FIX
// ═══════════════════════════════════════════
function setSidebar(open) {
  state.sidebarOpen = open;

  var sb = G('sidebar');
  var mw = G('main-wrapper');
  var ov = G('overlay');

  if (open) {
    sb.classList.remove('hidden');
    // On desktop (>600px) push the main content right
    if (window.innerWidth > 600) {
      mw.style.left = '260px';
    } else {
      // On mobile, show the overlay so tapping it closes sidebar
      ov.style.display = 'block';
    }
  } else {
    sb.classList.add('hidden');
    mw.style.left = '0px';
    ov.style.display = 'none';
  }

  saveState();
}

// Wire up toggle button
G('sidebarToggleBtn').addEventListener('click', function() {
  setSidebar(!state.sidebarOpen);
});

// Tap overlay to close sidebar on mobile
G('overlay').addEventListener('click', function() {
  setSidebar(false);
});

// ═══════════════════════════════════════════
// KEY DRAWER
// ═══════════════════════════════════════════
var drawerOpen = false;

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  G('key-drawer').classList.toggle('open', drawerOpen);
  if (drawerOpen) {
    for (var i = 0; i < 3; i++) G('keyField'+i).value = state.keys[i];
  }
}

G('keyIconBtn').addEventListener('click', toggleDrawer);
G('keyRowBtn').addEventListener('click', toggleDrawer);

// Eye buttons
document.querySelectorAll('.slot-eye').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var i = btn.getAttribute('data-i');
    var f = G('keyField'+i);
    f.type = f.type === 'password' ? 'text' : 'password';
  });
});

G('saveKeysBtn').addEventListener('click', function() {
  for (var i = 0; i < 3; i++) {
    state.keys[i] = G('keyField'+i).value.trim();
  }
  // Reset active key to first valid one
  var firstValid = state.keys.findIndex(function(k) { return k.length > 0; });
  state.activeKeyIdx = firstValid >= 0 ? firstValid : 0;
  saveState();
  updateKeyUI();
  var count = state.keys.filter(function(k) { return k.length > 0; }).length;
  toast(count + ' key(s) saved', 'ok');
  drawerOpen = false;
  G('key-drawer').classList.remove('open');
});

function updateKeyUI() {
  var validCount = 0;
  for (var i = 0; i < 3; i++) {
    var dot = G('kd'+i);
    var stat = G('kstat'+i);
    if (!state.keys[i]) {
      dot.className = 'key-dot';
      if (stat) stat.textContent = '—';
    } else if (i === state.activeKeyIdx) {
      dot.className = 'key-dot ok';
      if (stat) stat.textContent = '✅';
      validCount++;
    } else {
      dot.className = 'key-dot warn';
      if (stat) stat.textContent = '💤';
      validCount++;
    }
  }
  var label = validCount > 0 ? 'Key '+(state.activeKeyIdx+1) : 'None';
  G('keyActiveLabel').textContent = label;
  G('sKeyNum').textContent = label;
  G('sendBtn').disabled = validCount === 0;
}

function hasKeys() {
  return state.keys.some(function(k) { return k.length > 0; });
}

// ═══════════════════════════════════════════
// MODEL & TEMP
// ═══════════════════════════════════════════
G('modelPick').addEventListener('change', function() {
  state.model = G('modelPick').value;
  saveState();
  G('sMod').textContent = MODEL_NAMES[state.model] || state.model;
});

G('tempSlider').addEventListener('input', function() {
  G('tempDisplay').textContent = G('tempSlider').value;
  G('sTemp').textContent = G('tempSlider').value;
});

// ═══════════════════════════════════════════
// CONVERSATIONS
// ═══════════════════════════════════════════
G('newChatBtn').addEventListener('click', function() {
  state.activeId = null;
  renderSidebar();
  renderMessages();
  updateStats();
  G('msgField').focus();
});

G('clearChatBtn').addEventListener('click', function() {
  var c = activeConv();
  if (!c) return;
  c.messages = [];
  saveState();
  renderMessages();
  updateStats();
  toast('Chat cleared', '');
});

function renderSidebar() {
  var el = G('chatList');
  el.innerHTML = '';
  if (!state.convs.length) {
    el.innerHTML = '<div style="padding:10px 12px;font-size:11.5px;color:rgba(255,242,224,0.2);font-family:JetBrains Mono,monospace;">No conversations yet</div>';
    return;
  }
  state.convs.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'chat-row' + (c.id === state.activeId ? ' active' : '');
    d.innerHTML =
      '<span class="chat-row-icon">'+c.emoji+'</span>'+
      '<span class="chat-row-title">'+esc(c.title)+'</span>'+
      '<button class="chat-row-del" data-id="'+c.id+'">✕</button>';

    d.addEventListener('click', function(e) {
      if (e.target.classList.contains('chat-row-del')) {
        deleteConv(e.target.getAttribute('data-id'));
        return;
      }
      switchConv(c.id);
      // On mobile, close sidebar after picking a chat
      if (window.innerWidth <= 600) setSidebar(false);
    });
    el.appendChild(d);
  });
  G('topbarTitle').textContent = activeConv() ? activeConv().title : '';
}

function createConv(firstMsg) {
  var id = Date.now().toString();
  var title = firstMsg ? firstMsg.slice(0,44)+(firstMsg.length>44?'…':'') : 'New conversation';
  var c = { id:id, title:title, emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)], messages:[], createdAt:Date.now() };
  state.convs.unshift(c);
  state.activeId = id;
  saveState();
  renderSidebar();
  return c;
}

function switchConv(id) {
  state.activeId = id;
  saveState();
  renderSidebar();
  renderMessages();
  updateStats();
}

function deleteConv(id) {
  state.convs = state.convs.filter(function(c) { return c.id !== id; });
  if (state.activeId === id) state.activeId = state.convs[0] ? state.convs[0].id : null;
  saveState();
  renderSidebar();
  renderMessages();
  updateStats();
  toast('Deleted', '');
}

// ═══════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════
function renderMessages() {
  var c = activeConv();
  var el = G('messages');
  el.innerHTML = '';
  if (!c || !c.messages.length) {
    showWelcome();
    return;
  }
  c.messages.forEach(function(m, i) {
    el.appendChild(buildMsg(m, i));
  });
  el.scrollTop = el.scrollHeight;
}

function showWelcome() {
  var el = G('messages');
  var sugs = [
    {icon:'⚡',title:'Write code',sub:'Generate, debug or explain any code'},
    {icon:'🧠',title:'Brainstorm',sub:'Creative ideas and concepts'},
    {icon:'📖',title:'Explain it',sub:'Break down complex topics simply'},
    {icon:'✍️',title:'Draft content',sub:'Emails, essays, posts & more'},
  ];
  var html = '<div class="welcome">' +
    '<div class="wlc-icon"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg></div>' +
    '<div class="wlc-title">Hey, I\'m Lumi</div>' +
    '<div class="wlc-sub">Your personal AI powered by Mistral. What can I help with today?</div>' +
    '<div class="sug-grid">';
  sugs.forEach(function(s) {
    html += '<button class="sug-card" onclick="fillSug(\''+s.sub.replace(/'/g,"\\'")+'\')">' +
      '<span class="sug-card-icon">'+s.icon+'</span>' +
      '<div class="sug-card-title">'+s.title+'</div>' +
      '<div class="sug-card-sub">'+s.sub+'</div>' +
      '</button>';
  });
  html += '</div></div>';
  el.innerHTML = html;
}

window.fillSug = function(t) {
  G('msgField').value = t;
  autoResize();
  G('msgField').focus();
};

function buildMsg(msg, idx) {
  var wrap = document.createElement('div');
  wrap.className = 'msg-row ' + (msg.role === 'user' ? 'user' : 'ai');

  var av = msg.role === 'user' ? 'You' : 'L';
  var content = msg.role === 'assistant' ? parseMarkdown(msg.content) : esc(msg.content).replace(/\n/g,'<br>');

  var badge = msg.keySwitch ? '<div class="key-switch-note">⚡ Switched to Key '+msg.keySwitch+'</div>' : '';

  var regen = msg.role === 'assistant' ? '<button class="msg-act" onclick="regenFrom('+idx+')">↺</button>' : '';
  var edit  = msg.role === 'user'      ? '<button class="msg-act" onclick="editMsg('+idx+')">✎</button>' : '';

  wrap.innerHTML =
    '<div class="msg-av">'+av+'</div>'+
    '<div class="msg-body">'+
      badge+
      '<div class="bubble">'+content+'</div>'+
      '<div class="msg-meta">'+
        '<span class="msg-time">'+fmtTime(msg.ts)+'</span>'+
        '<div class="msg-act-btns">'+
          '<button class="msg-act" onclick="copyMsg('+idx+')">⎘</button>'+
          regen+edit+
        '</div>'+
      '</div>'+
    '</div>';

  // Add copy buttons to code blocks
  wrap.querySelectorAll('pre').forEach(function(pre) {
    var btn = document.createElement('button');
    btn.className = 'copy-code-btn';
    btn.textContent = 'Copy';
    btn.onclick = function() {
      var code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText);
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    };
    pre.appendChild(btn);
  });

  return wrap;
}

window.copyMsg = function(i) {
  var c = activeConv(); if (!c) return;
  navigator.clipboard.writeText(c.messages[i] ? c.messages[i].content : '');
  toast('Copied!', 'ok');
};

window.regenFrom = function(i) {
  var c = activeConv(); if (!c) return;
  c.messages = c.messages.slice(0, i);
  saveState(); renderMessages(); sendToApi(c);
};

window.editMsg = function(i) {
  var c = activeConv(); if (!c) return;
  var m = c.messages[i]; if (!m) return;
  G('msgField').value = m.content; autoResize();
  c.messages = c.messages.slice(0, i);
  saveState(); renderMessages();
  G('msgField').focus();
  toast('Edit and resend', '');
};

// ═══════════════════════════════════════════
// MARKDOWN PARSER
// ═══════════════════════════════════════════
function parseMarkdown(text) {
  var t = esc(text);
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, l, c) {
    return '<pre><code class="lang-'+l+'">'+c.trim()+'</code></pre>';
  });
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  t = t.replace(/^> (.+)$/gm,   '<blockquote>$1</blockquote>');
  t = t.replace(/^---$/gm,       '<hr>');
  t = t.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  t = t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  var parts = t.split('\n\n');
  t = parts.map(function(p) {
    if (!p.trim()) return '';
    if (/^<(h[1-3]|pre|blockquote|hr|li|ul|ol)/.test(p.trim())) return p;
    return '<p>'+p.replace(/\n/g,'<br>')+'</p>';
  }).join('');
  return t;
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function updateStats() {
  var c = activeConv();
  G('sMsgs').textContent = c ? c.messages.length : 0;
  G('sTok').textContent  = c ? c.messages.reduce(function(a,m){return a+tok(m.content);},0).toLocaleString() : '0';
}

// ═══════════════════════════════════════════
// SEND & FAILOVER
// ═══════════════════════════════════════════
function send() {
  var text = G('msgField').value.trim();
  if (!text) return;
  if (!hasKeys()) {
    toggleDrawer();
    toast('Add at least one API key first', 'warn');
    return;
  }

  var c = activeConv();
  if (!c) c = createConv(text);

  c.messages.push({ role:'user', content:text, ts:Date.now() });
  if (c.messages.length === 1) {
    c.title = text.slice(0,44)+(text.length>44?'…':'');
    renderSidebar();
  }

  saveState();
  renderMessages();
  G('msgField').value = '';
  autoResize();
  updateStats();
  sendToApi(c);
}

function sendToApi(c) {
  G('sendBtn').disabled = true;
  G('msgField').disabled = true;

  // Show typing indicator
  var typEl = document.createElement('div');
  typEl.className = 'typing-row';
  typEl.innerHTML =
    '<div class="msg-av" style="background:linear-gradient(135deg,#ff8c00,#c44200);color:#000;font-family:Playfair Display,serif;font-style:italic;font-size:15px;border-radius:9px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;box-shadow:0 0 10px rgba(255,140,0,0.3);">L</div>'+
    '<div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>';
  G('messages').appendChild(typEl);
  G('messages').scrollTop = G('messages').scrollHeight;

  // Build ordered list of keys to try
  var validKeys = [];
  for (var i = 0; i < 3; i++) {
    if (state.keys[i] && state.keys[i].length > 0) validKeys.push({k: state.keys[i], i: i});
  }

  var startPos = validKeys.findIndex(function(x) { return x.i === state.activeKeyIdx; });
  if (startPos < 0) startPos = 0;
  var ordered = validKeys.slice(startPos).concat(validKeys.slice(0, startPos));

  var sysPrompt = 'You are Lumi, a helpful, warm, and intelligent AI assistant powered by Mistral AI. Be concise and clear.';

  function tryKey(idx) {
    if (idx >= ordered.length) {
      typEl.remove();
      toast('All keys failed — check your API keys', 'err');
      G('sendBtn').disabled = !hasKeys();
      G('msgField').disabled = false;
      G('msgField').focus();
      return;
    }

    var keyObj = ordered[idx];
    var apiMessages = [{role:'system',content:sysPrompt}].concat(
      c.messages.map(function(m) { return {role:m.role,content:m.content}; })
    );

    fetch('https://api.mistral.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer '+keyObj.k
      },
      body: JSON.stringify({
        model: state.model,
        temperature: parseFloat(G('tempSlider').value),
        max_tokens: 2048,
        messages: apiMessages
      })
    })
    .then(function(res) { return res.json().then(function(data) { return {res:res, data:data}; }); })
    .then(function(obj) {
      var res = obj.res, data = obj.data;

      if (!res.ok) {
        if (res.status === 401 || res.status === 429 || res.status === 503) {
          toast('Key '+(keyObj.i+1)+' failed ('+res.status+'), trying next…', 'warn');
          tryKey(idx + 1);
          return;
        }
        typEl.remove();
        toast('Error: '+(data.message||('HTTP '+res.status)), 'err');
        G('sendBtn').disabled = !hasKeys();
        G('msgField').disabled = false;
        G('msgField').focus();
        return;
      }

      // Success
      var switched = (keyObj.i !== state.activeKeyIdx);
      if (switched) {
        state.activeKeyIdx = keyObj.i;
        saveState();
        updateKeyUI();
        toast('⚡ Switched to Key '+(keyObj.i+1)+' — context preserved', 'warn');
      }

      var reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '(No response)';
      typEl.remove();

      var msgObj = { role:'assistant', content:reply, ts:Date.now() };
      if (switched) msgObj.keySwitch = keyObj.i + 1;

      c.messages.push(msgObj);
      saveState();
      renderMessages();
      updateStats();

      G('sendBtn').disabled = !hasKeys();
      G('msgField').disabled = false;
      G('msgField').focus();
    })
    .catch(function() {
      toast('Key '+(keyObj.i+1)+' network error, trying next…', 'warn');
      tryKey(idx + 1);
    });
  }

  tryKey(0);
}

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
function autoResize() {
  var ta = G('msgField');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

G('msgField').addEventListener('input', autoResize);
G('msgField').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
G('sendBtn').addEventListener('click', send);

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  G('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 2300);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadState();

// Apply sidebar state
setSidebar(state.sidebarOpen);

// Apply model
G('modelPick').value = state.model;
G('sMod').textContent = MODEL_NAMES[state.model] || state.model;

// Apply keys
updateKeyUI();

// Render
renderSidebar();
renderMessages();
updateStats();

// Focus input
G('msgField').focus();

// First-run: open key drawer if no keys set
if (!hasKeys()) {
  setTimeout(function() {
    toggleDrawer();
    toast('Add your Mistral API key(s) to start chatting', 'warn');
  }, 700);
}

</script>
</body>
</html>
